<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account — AppNest</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/theme.js"></script>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="bg-bg text-text font-sans antialiased min-h-screen relative">
  <div class="grid-backdrop fixed inset-0 pointer-events-none"></div>

  <div class="relative mx-auto max-w-content px-5 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5">
      <span class="grid place-items-center w-8 h-8 rounded-lg bg-primary text-on-primary font-mono font-bold text-sm">A</span>
      <span class="font-bold text-lg tracking-tight">App<span class="text-primary">Nest</span></span>
    </a>
    <div class="flex items-center gap-2">
      <button data-theme-toggle aria-label="Toggle theme" class="focus-ring inline-flex items-center gap-2 h-9 px-3 rounded-lg border border-border text-sm font-medium hover:bg-surface2 transition-colors">
        <svg class="w-4 h-4 hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v2M12 19v2M5 12H3M21 12h-2M6.3 6.3 4.9 4.9M19.1 19.1l-1.4-1.4M17.7 6.3l1.4-1.4M4.9 19.1l1.4-1.4"/><circle cx="12" cy="12" r="4"/></svg>
        <svg class="w-4 h-4 block dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
        <span data-theme-label class="hidden sm:inline">Light</span>
      </button>
      <a href="index.html" class="text-sm font-medium text-muted hover:text-text transition-colors px-2">← Home</a>
    </div>
  </div>

  <main class="relative grid place-items-center px-5 py-10 md:py-14">
    <div class="w-full max-w-md">
      <div class="text-center mb-7">
        <p class="eyebrow text-primary mb-2">// Join AppNest</p>
        <h1 class="text-3xl font-extrabold tracking-tight">Create your account</h1>
        <p class="text-muted mt-2">Free forever. Bookmark apps and get the weekly digest.</p>
      </div>

      <div class="rounded-xl2 border border-border bg-surface p-6 md:p-7">
        <div class="grid grid-cols-2 p-1 rounded-xl bg-surface2 mb-6 text-sm font-semibold">
          <a href="login.html" class="h-9 grid place-items-center rounded-lg text-muted hover:text-text transition-colors">Log in</a>
          <span class="h-9 grid place-items-center rounded-lg bg-surface text-text shadow-sm">Register</span>
        </div>

        <div class="grid gap-2.5">
          <button class="h-11 inline-flex items-center justify-center gap-2.5 rounded-xl border border-border font-semibold hover:bg-surface2 transition-colors focus-ring">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 12.8c0-2.3 1.9-3.4 2-3.5-1.1-1.6-2.8-1.8-3.4-1.8-1.4-.1-2.8.9-3.5.9s-1.8-.8-3-.8c-1.5 0-3 .9-3.8 2.3-1.6 2.8-.4 7 1.2 9.3.8 1.1 1.7 2.4 2.9 2.3 1.2 0 1.6-.7 3-.7s1.8.7 3 .7 2-1.1 2.7-2.2c.9-1.2 1.2-2.5 1.2-2.5-.1 0-2.4-.9-2.4-3.6ZM14.2 6c.6-.8 1.1-1.9 1-3-.9.1-2 .6-2.7 1.4-.6.7-1.1 1.8-1 2.9 1 .1 2-.5 2.7-1.3Z"/></svg>
            Sign up with Apple
          </button>
          <button class="h-11 inline-flex items-center justify-center gap-2.5 rounded-xl border border-border font-semibold hover:bg-surface2 transition-colors focus-ring">
            <span class="font-mono font-bold text-primary">G</span> Sign up with Google
          </button>
        </div>

        <div class="flex items-center gap-3 my-6">
          <span class="h-px flex-1 bg-border"></span>
          <span class="eyebrow text-muted">or email</span>
          <span class="h-px flex-1 bg-border"></span>
        </div>

        <form data-auth-form class="space-y-4">
          <div>
            <label class="eyebrow text-muted block mb-2">Name</label>
            <input type="text" required placeholder="Nest Pany" class="focus-ring w-full h-11 px-4 rounded-xl bg-bg border border-border placeholder:text-muted/70" />
          </div>
          <div>
            <label class="eyebrow text-muted block mb-2">Email</label>
            <input type="email" required placeholder="you@icloud.com" class="focus-ring w-full h-11 px-4 rounded-xl bg-bg border border-border placeholder:text-muted/70" />
          </div>
          <div>
            <label class="eyebrow text-muted block mb-2">Password</label>
            <input type="password" required minlength="8" placeholder="At least 8 characters" class="focus-ring w-full h-11 px-4 rounded-xl bg-bg border border-border placeholder:text-muted/70" />
          </div>
          <label class="flex items-start gap-2.5 text-sm text-muted select-none cursor-pointer">
            <input type="checkbox" required class="mt-0.5 w-4 h-4 rounded border-border accent-primary" />
            <span>I agree to the <a href="#" class="text-primary hover:underline">Terms</a> &amp; <a href="#" class="text-primary hover:underline">Privacy Policy</a>.</span>
          </label>
          <button type="submit" class="w-full h-11 rounded-xl bg-primary text-on-primary font-semibold hover:bg-primary-hover transition-colors focus-ring">Create account</button>
        </form>
      </div>

      <p class="text-center text-sm text-muted mt-5">Already have an account? <a href="login.html" class="font-semibold text-primary hover:underline">Log in</a></p>
    </div>
  </main>

  <script src="assets/bookmarks.js"></script>
  <script src="assets/app.js"></script>
  <script>
    document.querySelector("[data-auth-form]").addEventListener("submit", (e) => {
      e.preventDefault();
      window.AppNestBookmarks && window.AppNestBookmarks.toast("✓ Account created (demo)");
      setTimeout(() => (window.location.href = "index.html"), 1000);
    });
  </script>
</body>
</html>
